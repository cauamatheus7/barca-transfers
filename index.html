<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --ink: #0c0e1c;
    --ink-rise: #141729;
    --ink-deep: #06080f;
    --paper: #f0e8d6;
    --blue: #1a4faf;
    --blue-deep: #002f6c;
    --grenat: #b3163a;
    --grenat-deep: #82001f;
    --gold: #f5c518;
    --silver: #d4d8e0;
    --mist: #6b7388;
    --rule: #1f2236;
    --rule-bright: #2a2e48;
    --win: #6dd47a;
    --font-display: "Fraunces", "Times New Roman", serif;
    --font-body: "Manrope", -apple-system, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "SFMono-Regular", monospace;
    --font-numeric: "Big Shoulders Display", "Manrope", sans-serif;
  }
  * { box-sizing: border-box; }
  html { background: var(--ink-deep); }
  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--ink);
    color: var(--silver);
    line-height: 1.55;
    font-feature-settings: "tnum", "ss01";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(26, 79, 175, 0.08), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(179, 22, 58, 0.06), transparent 45%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.95 0 0 0 0 0.95 0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-attachment: fixed;
  }
  ::selection { background: var(--gold); color: var(--ink); }
  a { color: var(--silver); text-decoration: none; }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px 64px; }

  /* ─── ticker top bar ─── */
  .ticker {
    border-bottom: 1px solid var(--rule);
    padding: 10px 0;
    margin-bottom: 36px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--mist);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px 24px;
  }
  .ticker .live::before {
    content: "";
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--grenat);
    margin-right: 6px;
    vertical-align: 1px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(179, 22, 58, 0.7); }
    50%      { box-shadow: 0 0 0 6px rgba(179, 22, 58, 0); }
  }
  .ticker .label { color: var(--silver); }
  .ticker .sep   { color: var(--rule-bright); }
  .ticker .kicker-mercado {
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.18em;
  }

  /* ─── masthead ─── */
  .masthead {
    position: relative;
    padding: 12px 0 24px;
    border-bottom: 2px solid var(--paper);
    margin-bottom: 28px;
    overflow: hidden;
  }
  .masthead-shield {
    position: absolute;
    right: -40px;
    top: -10px;
    width: 220px;
    opacity: 0.07;
    pointer-events: none;
  }
  .kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 14px;
    font-weight: 500;
  }
  h1.title {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 300;
    font-style: italic;
    font-size: clamp(38px, 6vw, 76px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: var(--paper);
    font-variation-settings: "opsz" 144;
  }
  h1.title em {
    font-style: normal;
    font-weight: 600;
    color: var(--silver);
  }
  .strap {
    margin: 18px 0 0;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--mist);
    letter-spacing: 0.04em;
    max-width: 60ch;
    line-height: 1.7;
  }
  .strap b { color: var(--silver); font-weight: 500; }

  /* ─── nav (page tabs) ─── */
  .page-nav {
    display: flex;
    gap: 0;
    margin: 32px 0 0;
    padding: 0;
    border-bottom: 1px solid var(--rule);
  }
  .page-nav a {
    padding: 14px 24px 14px 0;
    margin-right: 28px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mist);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 200ms;
  }
  .page-nav a:hover { color: var(--silver); }
  .page-nav a.active {
    color: var(--paper);
    border-bottom-color: var(--gold);
  }

  /* ─── section titles ─── */
  section { margin: 48px 0 64px; }
  .section-title {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin: 0 0 28px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
  }
  .section-title h2 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 400;
    font-style: italic;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: var(--paper);
  }
  .section-title .num {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .section-title .meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--mist);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ───────────────────────────────────────────
     NEWS FEED — OneFootball-style cards
     ─────────────────────────────────────────── */
  .day-block { margin-bottom: 40px; }
  .day-header {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin: 0 0 16px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--rule-bright);
    font-weight: 500;
  }
  .news-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px 24px;
    margin-bottom: 8px;
  }
  .news-card {
    transition: transform 240ms ease;
  }
  .news-card:hover { transform: translateY(-4px); }
  .news-card .cover {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    margin-bottom: 14px;
    border: 1px solid var(--rule);
    background: var(--ink-rise);
  }
  /* Layer 1: foto blurada e ampliada — estende o fundo do photo nos cantos do card */
  .news-card .cover .bg {
    position: absolute;
    inset: -8%;
    background-size: cover;
    background-position: center;
    filter: blur(32px) saturate(1.35) brightness(0.55);
    z-index: 1;
  }
  /* Layer 2: foto nítida contida com padding pra dar zoom-out real */
  .news-card .cover img {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    padding: 14px 0;
    box-sizing: border-box;
    transition: transform 600ms ease;
  }
  .news-card:hover .cover img { transform: scale(1.03); }
  /* Text cover (no player matched) */
  .news-card .cover.text {
    align-items: flex-end;
    justify-content: flex-start;
    padding: 22px;
  }
  .news-card .cover.text .text-cover-source {
    position: relative;
    z-index: 2;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    color: var(--paper);
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  .news-card .cover .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: rgba(12, 14, 28, 0.85);
    color: var(--gold);
    padding: 4px 9px;
    backdrop-filter: blur(4px);
    z-index: 3;
  }
  .news-card.rumor .cover .badge { color: var(--grenat); }
  .news-card .meta-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: 10px;
  }
  .news-card .meta-row .journalist {
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.14em;
  }
  .news-card h3 {
    margin: 0 0 10px;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 20px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--paper);
    font-variation-settings: "opsz" 36;
  }
  .news-card h3 a { color: inherit; }
  .news-card h3 a:hover { color: var(--gold); }
  .news-card .snippet {
    margin: 0 0 10px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--silver);
    opacity: 0.78;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-card .player-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .player-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--paper);
    background: rgba(179, 22, 58, 0.18);
    border: 1px solid var(--grenat);
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .news-meta {
    margin: 0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .news-toggle {
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--silver);
    padding: 10px 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 200ms, color 200ms;
  }
  .news-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .news-empty {
    border: 1px dashed var(--rule-bright);
    padding: 56px 24px;
    text-align: center;
    color: var(--mist);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ─── Nomes na pauta ─── */
  .rumors-explainer {
    color: var(--silver);
    opacity: 0.78;
    font-size: 13.5px;
    line-height: 1.6;
    max-width: 70ch;
    margin: 0 0 24px;
  }
  .rumors-explainer b { color: var(--paper); font-weight: 600; }
  .rumors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .rumor-card {
    background: var(--ink-rise);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--grenat);
    padding: 16px 16px 18px;
    display: flex;
    flex-direction: column;
    transition: transform 240ms ease, border-color 240ms ease;
  }
  .rumor-card:hover {
    transform: translateY(-3px);
    border-top-color: var(--gold);
  }
  .rumor-card.cold {
    border-top-color: var(--rule-bright);
    opacity: 0.7;
  }
  .rumor-card .photo-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    margin-bottom: 14px;
    background: var(--ink-deep);
  }
  .rumor-card .photo-wrap .bg {
    position: absolute;
    inset: -8%;
    background-size: cover;
    background-position: center;
    filter: blur(22px) saturate(1.3) brightness(0.5);
    z-index: 1;
  }
  .rumor-card .photo-wrap img {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    padding: 10px 0;
    box-sizing: border-box;
  }
  .rumor-card h4 {
    margin: 0 0 4px;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: 19px;
    line-height: 1.15;
    color: var(--paper);
    letter-spacing: -0.012em;
  }
  .rumor-card .rumor-meta {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.12em;
    color: var(--mist);
    text-transform: uppercase;
    margin: 0 0 14px;
    line-height: 1.5;
  }
  .rumor-card .rumor-meta .pos { color: var(--gold); }
  .rumor-card .market-value {
    display: inline-block;
    font-family: var(--font-numeric);
    font-weight: 800;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: -0.01em;
    line-height: 1;
    margin: 4px 0 12px;
  }
  .rumor-card .market-value::before {
    content: "VALOR";
    display: block;
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--mist);
    margin-bottom: 4px;
  }
  .rumor-card .conf {
    margin: auto 0 12px;
  }
  .rumor-card .conf-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--mist);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .rumor-card .conf-pct {
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .rumor-card.cold .conf-pct { color: var(--mist); }
  .rumor-card .conf-bar {
    height: 3px;
    background: var(--rule);
    overflow: hidden;
    position: relative;
  }
  .rumor-card .conf-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--grenat) 0%, var(--gold) 100%);
    transition: width 900ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .rumor-card .latest-news {
    font-size: 11.5px;
    line-height: 1.45;
    color: var(--silver);
    opacity: 0.72;
    margin: 0;
  }
  .rumor-card .latest-news .src {
    color: var(--gold);
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 3px;
    opacity: 0.95;
  }
  .rumor-card .no-news {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--mist);
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* ───────────────────────────────────────────
     COMPARADOR — chips, photo grid, dossiers
     ─────────────────────────────────────────── */
  .position-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .position-chip {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--silver);
    padding: 10px 18px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 180ms;
    font-weight: 500;
  }
  .position-chip:hover { border-color: var(--rule-bright); color: var(--paper); }
  .position-chip.active {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }

  .selection-bar {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 36px;
    padding: 18px 24px;
    background: var(--ink-rise);
    border-left: 2px solid var(--gold);
    min-height: 96px;
  }
  .selection-bar .hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .selection-bar .selected-chip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 16px 4px 4px;
    background: rgba(245, 197, 24, 0.08);
    border: 1px solid var(--gold);
    cursor: pointer;
    transition: background 150ms;
  }
  .selection-bar .selected-chip:hover { background: rgba(245, 197, 24, 0.16); }
  .selection-bar .selected-chip img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--ink-deep);
  }
  .selection-bar .selected-chip .info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .selection-bar .selected-chip .name {
    font-weight: 600;
    font-size: 13px;
    color: var(--paper);
  }
  .selection-bar .selected-chip .src {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: var(--mist);
    text-transform: uppercase;
  }
  .selection-bar .selected-chip .x {
    color: var(--mist);
    font-size: 16px;
    margin-left: 4px;
    line-height: 1;
  }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .group-divider {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 14px 0 6px;
    border-bottom: 1px dashed var(--rule);
    margin: 8px 0 4px;
  }
  .player-tile {
    position: relative;
    padding: 22px 14px 18px;
    background: var(--ink-rise);
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: all 200ms ease;
    text-align: center;
    overflow: hidden;
  }
  .player-tile:hover {
    border-color: var(--rule-bright);
    transform: translateY(-3px);
  }
  .player-tile.selected {
    border-color: var(--gold);
    box-shadow: inset 0 0 0 2px var(--gold), 0 8px 24px -12px rgba(245, 197, 24, 0.4);
  }
  .player-tile.selected::after {
    content: "✓";
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    background: var(--gold);
    color: var(--ink);
    border-radius: 50%;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .player-tile .badge {
    position: absolute;
    top: 8px; left: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mist);
  }
  .player-tile.rumor .badge { color: var(--grenat); }
  .player-tile.main .badge,
  .player-tile.athletic .badge { color: var(--blue); }
  .player-tile .photo {
    width: 96px;
    height: 96px;
    margin: 8px auto 12px;
    border-radius: 50%;
    background: var(--ink-deep);
    overflow: hidden;
    border: 2px solid var(--rule-bright);
    transition: border-color 200ms;
  }
  .player-tile.rumor .photo { border-color: var(--grenat); }
  .player-tile.main .photo,
  .player-tile.athletic .photo { border-color: var(--blue); }
  .player-tile.selected .photo { border-color: var(--gold); }
  .player-tile .photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .player-tile .photo.fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 600;
    font-style: italic;
    font-size: 32px;
    color: var(--mist);
  }
  .player-tile h4 {

// Fotos locais (baixadas via scrapers/fetch_photos.py) — evita bloqueio ORB do Chrome
// quando carregadas direto da CDN do SofaScore em outro domínio (GitHub Pages, etc).
// Cache-buster baseado em window.DATA.generated força o browser a re-baixar quando
// reprocessamos as fotos (ex: pra remover fundo branco).
const PHOTO_VER = encodeURIComponent(window.DATA.generated || "1");
const PHOTO_URL = (id) => `assets/photos/${id}.webp?v=${PHOTO_VER}`;

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function fmt(v) {
  if (v == null) return "—";
  if (typeof v === "number") {
    if (Number.isInteger(v)) return v.toString();
    return v.toFixed(2);
  }
  return v.toString();
}
function sourceMeta(s) {
  return window.DATA.sources[s] || { order: 9, label_short: s || "outros", label_long: (s || "OUTROS").toUpperCase(), default_team: "?" };
}
function toDate(iso) {
  if (!iso) return null;
  const hasTZ = /Z$|[+-]\d{2}:?\d{2}$/.test(iso);
  return new Date(hasTZ ? iso : iso + "Z");
}
function dayKey(iso) {
  const dt = toDate(iso);
  if (!dt || isNaN(dt)) return "";
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const d = String(dt.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function dayLabel(key) {
  if (!key) return "Sem data";
  const today = new Date();
  const tk = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const yd = new Date(today.getTime() - 86400000);
  const yk = `${yd.getFullYear()}-${String(yd.getMonth()+1).padStart(2,"0")}-${String(yd.getDate()).padStart(2,"0")}`;
  if (key === tk) return "Hoje";
  if (key === yk) return "Ontem";
  const [y, m, d] = key.split("-");
  return `${d}/${m}/${y}`;
}
function fmtTime(iso) {
  const dt = toDate(iso);
  if (!dt || isNaN(dt)) return "";
  return dt.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
}
function playerById(id) {
  return window.DATA.players.find(p => p.id === id);
}
function initials(name) {
  return (name || "?").split(/\s+/).filter(Boolean).slice(0, 2)
    .map(w => w[0]).join("").toUpperCase();
}

// Ticker date
(() => {
  const el = document.getElementById("ticker-date");
  if (!el) return;
  const now = new Date();
  const wd = now.toLocaleDateString("pt-BR", { weekday: "long" }).toUpperCase();
  const dt = now.toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" }).toUpperCase();
  el.innerHTML = `<span class="label">${esc(wd)}</span> <span class="sep">/</span> ${esc(dt)}`;
})();

// "Atualizado há X" — calcula relativo a window.DATA.generated_iso
function formatLastUpdated() {
  const el = document.getElementById("last-updated");
  if (!el) return;
  const iso = window.DATA && window.DATA.generated_iso;
  if (!iso) { el.textContent = ""; return; }
  const gen = new Date(iso);
  if (isNaN(gen)) { el.textContent = ""; return; }
  const diffMin = Math.floor((Date.now() - gen.getTime()) / 60000);
  let label;
  if (diffMin < 1) label = "AGORA MESMO";
  else if (diffMin < 60) label = `HÁ ${diffMin} MIN`;
  else if (diffMin < 60 * 24) {
    const h = Math.floor(diffMin / 60);
    const m = diffMin % 60;
    label = m > 0 && h < 5 ? `HÁ ${h}H ${m}MIN` : `HÁ ${h}H`;
  } else {
    label = `HÁ ${Math.floor(diffMin / (60 * 24))}D`;
  }
  el.innerHTML = `<span class="label">ATUALIZADO</span> <span class="sep">/</span> ${label}`;
}
formatLastUpdated();
setInterval(formatLastUpdated, 60000);  // atualiza a cada minuto

const NEWS_PAGE_SIZE = 9;
let newsExpanded = false;

function newsCardHTML(it) {
  const time = fmtTime(it.published_at || it.last_seen);
  const tagsHtml = (it.players_mentioned || [])
    .map(pid => window.DATA.player_names[pid])
    .filter(n => n)
    .map(n => `<span class="player-tag">${esc(n)}</span>`).join("");
  const mentioned = (it.players_mentioned || []).map(pid => playerById(pid)).filter(Boolean);
  const isRumor = mentioned.some(p => p.source === "rumor");
  const cardCls = `news-card ${isRumor ? "rumor" : ""}`;

  // Cover: foto do jogador (se mencionado) ou text cover editorial
  let coverHtml;
  if (mentioned.length >= 1) {
    const p = mentioned[0];
    const photoSrc = PHOTO_URL(p.id);
    const moreBadge = mentioned.length > 1
      ? `<span class="badge">+${mentioned.length - 1}</span>`
      : `<span class="badge">${esc((it.journalist || "?").toUpperCase())}</span>`;
    coverHtml = `
      <div class="cover">
        <div class="bg" style="background-image: url('${photoSrc}')"></div>
        ${moreBadge}
        <img src="${photoSrc}" alt="${esc(p.name)}" loading="lazy"
             onerror="this.style.display='none'">
      </div>`;
  } else {
    coverHtml = `
      <div class="cover text">
        <span class="badge">${esc((it.journalist || "?").toUpperCase())}</span>
        <span class="text-cover-source">${esc(it.title.slice(0, 70))}${it.title.length > 70 ? "…" : ""}</span>
      </div>`;
  }

  return `
    <article class="${cardCls}">
      ${coverHtml}
      <div class="meta-row">
        <span class="journalist">${esc(it.journalist || "?")}</span>
        <span>${esc(time)}</span>
      </div>
      <h3><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a></h3>
      <p class="snippet">${esc(it.snippet || "")}</p>
    </article>`;
}

function renderNews() {
  const container = document.getElementById("news-feed");
  const toggleBtn = document.getElementById("news-toggle");
  const items = window.DATA.news || [];

  if (items.length === 0) {
    container.innerHTML = '<div class="news-empty">Sem notícias capturadas ainda · A rotina rodará em breve</div>';
    toggleBtn.style.display = "none";
    return;
  }

  const visible = newsExpanded ? items : items.slice(0, NEWS_PAGE_SIZE);
  const byDay = {};
  for (const it of visible) {
    const k = dayKey(it.published_at || it.last_seen);
    (byDay[k] = byDay[k] || []).push(it);
  }
  const datedKeys = Object.keys(byDay).filter(k => k).sort().reverse();
  const noDate = byDay[""] ? [""] : [];
  const dayKeys = [...datedKeys, ...noDate];

  let html = "";
  for (const k of dayKeys) {
    html += `<div class="day-block"><h3 class="day-header">${esc(dayLabel(k))}</h3><div class="news-grid">`;
    for (const it of byDay[k]) {
      html += newsCardHTML(it);
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;

  if (items.length > NEWS_PAGE_SIZE) {
    toggleBtn.style.display = "";
    toggleBtn.textContent = newsExpanded
      ? "Mostrar menos ↑"
      : `Mostrar mais ↓ (${items.length - NEWS_PAGE_SIZE} restantes)`;
  } else {
    toggleBtn.style.display = "none";
  }
}

document.getElementById("news-toggle").addEventListener("click", () => {
  newsExpanded = !newsExpanded;
  renderNews();
});

renderNews();
</script></body></html>
